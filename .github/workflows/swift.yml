name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (iOS Simulator)
        run: |
          xcodebuild \
            -project GoodThenIm.xcodeproj \
            -scheme GoodThenIm \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            build

      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -project GoodThenIm.xcodeproj \
            -scheme GoodThenIm \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            test
