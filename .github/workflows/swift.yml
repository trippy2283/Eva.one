name: iOS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve simulator destination
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DESTINATION=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')
          if [[ -z "${DESTINATION:-}" ]]; then
            echo "No available iPhone simulator found." >&2
            exit 1
          fi
          echo "destination=id=$DESTINATION" >> "$GITHUB_OUTPUT"
          echo "Using simulator destination id=$DESTINATION"

      - name: Build (iOS Simulator)
        run: |
          xcodebuild \
            -project GoodThenIm.xcodeproj \
            -scheme GoodThenIm \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -configuration Debug \
            build

      - name: Test (iOS Simulator)
        run: |
          xcodebuild \
            -project GoodThenIm.xcodeproj \
            -scheme GoodThenIm \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -configuration Debug \
            test
